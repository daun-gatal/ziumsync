name: PR Checks

on:
  pull_request:
    branches:
      - main

# This concurrency block ensures that if a new commit is pushed to the PR branch,
# any currently running workflows for the same PR will be instantly cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Validate Python Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Check dependencies
        run: |
          cd backend
          uv sync --frozen

      - name: Static Type Check (Mypy)
        run: |
          cd backend
          uv run mypy ziumsync/ tests/

      - name: Lint and Format Check (Ruff)
        run: |
          cd backend
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Unit Tests
        run: |
          cd backend
          uv run pytest

  docker-build-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ghcr.io/daun-gatal/ziumsync-backend:test
          # Utilize GitHub Actions cache to make subsequent PR builds extremely fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
